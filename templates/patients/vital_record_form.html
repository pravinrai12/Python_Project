{% extends 'base/base.html' %}
{% block title %}Record Vitals{% endblock %}
{% block page_title %}Record Vital Signs{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;margin:auto;">
    <div class="card-header py-3 px-4"><i class="fas fa-heartbeat text-danger me
2"></i>Record Vitals for <strong>{{ patient }}</strong></div>
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Blood Pressure Systolic
                        (mmHg)</label>
                    <input type="number" name="blood_pressure_systolic" class="form-control" placeholder="e.g. 120">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Blood Pressure Diastolic
                        (mmHg)</label>
                    <input type="number" name="blood_pressure_diastolic" class="form-control" placeholder="e.g. 80">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Heart Rate (BPM)</label>
                    <input type="number" name="heart_rate" class="form-control" placeholder="e.g. 72">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Temperature (°C)</label>
                    <input type="number" step="0.1" name="temperature" class="form-control" placeholder="e.g. 37.0">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Oxygen Saturation (%)</label>
                    <input type="number" step="0.1" name="oxygen_saturation" class="form
control" placeholder="e.g. 98.5">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Weight (kg)</label>
                    <input type="number" step="0.01" name="weight" class="form-control" placeholder="e.g. 70.5">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Height (cm)</label>
                    <input type="number" step="0.01" name="height" class="form-control" placeholder="e.g. 175.0">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Notes</label>
                    <textarea name="notes" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-danger"><i class="fas fa-heartbeat me
2"></i>Save Vitals</button>
                <a href="{% url 'patient_detail' patient.pk %}" class="btn btn-outline
secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
